schemaVersion: 2.0.0
commandTests:
  - name: Web engine is already downloaded
    setup:
      - - flutter
        - create
        - test_app
    teardown:
      - - rm
        - -r
        - test_app
    command: bash
    args:
      - -c
      - |
        cd test_app \
        && timeout --preserve-status 480s flutter build web
    excludedOutput:
      - Checking
      - Installing
      - Downloading
  - name: Web platform is enabled
    command: bash
    args:
      - -c
      - |
        flutter config | grep 'enable-web: true'
    expectedOutput:
      - 'enable-web: true'
fileContentTests:
  - name: Dart and Flutter analytics are disabled
    path: /home/flutter/.dart-tool/dart-flutter-telemetry.config
    expectedContents:
      - reporting=0
