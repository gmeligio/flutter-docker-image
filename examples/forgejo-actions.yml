name: Build
"on":
  push: {}
jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/gmeligio/flutter-android:3.44.8
    steps:
      - name: Set up Node.js for actions/checkout (act-based runners don't provide it)
        run: |-
          curl -fsSL https://nodejs.org/dist/v20.19.2/node-v20.19.2-linux-x64.tar.xz \
            | tar -xJ -C "$HOME"
          echo "$HOME/node-v20.19.2-linux-x64/bin" >> "$GITHUB_PATH"
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        run: flutter build apk
