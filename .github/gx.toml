[actions]
"actions/checkout" = "^6"
"actions/create-github-app-token" = "^2"
"actions/download-artifact" = "^6"
"actions/github-script" = "^8"
"actions/upload-artifact" = "^5"
"docker/build-push-action" = "^6"
"docker/login-action" = "^3"
"docker/metadata-action" = "^5"
"docker/scout-action" = "^1"
"docker/setup-buildx-action" = "^3"
"github/codeql-action/upload-sarif" = "^4"
"grafana/github-api-commit-action" = "^1"
"jdx/mise-action" = "^4"
"ossf/scorecard-action" = "^2"
"peter-evans/create-pull-request" = "^7"
"peter-evans/dockerhub-description" = "^5"
"step-security/harden-runner" = "^2"

# Workflow-security rules enforce the structural properties defined by the
# `ci-workflow-hardening` capability. Each rule below maps to a requirement in
# that spec — this block is the single auditable source of that mapping (no
# SECURITY.md). Severities: load-bearing "pwn request" / least-privilege gates
# at `error`; hygiene rules at `warn`. The current corpus passes all six.
[lint.rules]
# "Every workflow declares a minimum-scope permissions: block"
missing-permissions = { level = "error" }
# "Least-privilege token scopes" — hygiene; warn so over-grants surface without
# blocking (the corpus already passes this at error).
excessive-permissions = { level = "warn" }
# "Rejection of the pull_request_target 'pwn request' pattern"
dangerous-trigger = { level = "error" }
# "Untrusted code is not executed with privileged context" — privileged job
# checking out PR HEAD. gx.yml's `tidy` job matches the pattern but is
# fork-gated (head.repo.full_name == github.repository), so the attack is not
# reachable from forks; exempt that one workflow.
pr-head-checkout = { level = "error", ignore = [
    { workflow = ".github/workflows/gx.yml" },
] }
# "concurrency: on push/schedule triggers" — hygiene; warn (corpus passes).
missing-concurrency = { level = "warn" }
# "Fork-secret gates on PR-triggered workflows"
unprotected-secrets = { level = "error" }
