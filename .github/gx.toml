[actions]
"actions/checkout" = "^7.0.0"
"actions/create-github-app-token" = "^3.0.0"
"actions/download-artifact" = "^8.0.0"
"actions/github-script" = "^9.0.0"
"actions/upload-artifact" = "^7.0.0"
"docker/build-push-action" = "^7.0.0"
"docker/login-action" = "^4.0.0"
"docker/metadata-action" = "^6.0.0"
"docker/scout-action" = "^1"
"docker/setup-buildx-action" = "^4.0.0"
"github/codeql-action/upload-sarif" = "^4"
"grafana/github-api-commit-action" = "^1"
"jdx/mise-action" = "^4"
"ossf/scorecard-action" = "^2"
"peter-evans/create-pull-request" = "^8.0.0"
"peter-evans/dockerhub-description" = "^5"
"step-security/harden-runner" = "^2"

# Rules map to the `ci-workflow-hardening` capability spec.
[lint.rules]
# Both ignored jobs are fork-gated (`head.repo.full_name == github.repository`),
# so PR HEAD is only checked out for same-repo branches — the 'pwn request' path
# is unreachable, but gx can't see the `if:` gate.
#   - gx.yml `tidy`: lockfile tidy on same-repo PRs.
#   - update-docs.yml `generate`: writes regenerated docs to the PR branch
#     (maintainer / renovate[bot] only); needs write + PR-head checkout.
pr-head-checkout = { level = "error", ignore = [
    { workflow = ".github/workflows/gx.yml" },
    { workflow = ".github/workflows/update-docs.yml" },
] }

# windows-image.yml is reusable (`workflow_call`) and omits `permissions:` so each
# caller's grant flows through; see the note in that file. Callers declare scope.
missing-permissions = { level = "error", ignore = [
    { workflow = ".github/workflows/windows-image.yml" },
] }
