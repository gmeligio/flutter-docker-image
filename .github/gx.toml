[actions]
"actions/checkout" = "^6"
"actions/create-github-app-token" = "^2"
"actions/download-artifact" = "^6"
"actions/github-script" = "^8"
"actions/upload-artifact" = "^5"
"docker/build-push-action" = "^6"
"docker/login-action" = "^3"
"docker/metadata-action" = "^5"
"docker/scout-action" = "^1"
"docker/setup-buildx-action" = "^3"
"github/codeql-action/upload-sarif" = "^4"
"grafana/github-api-commit-action" = "^1"
"jdx/mise-action" = "^4"
"ossf/scorecard-action" = "^2"
"peter-evans/create-pull-request" = "^7"
"peter-evans/dockerhub-description" = "^5"
"step-security/harden-runner" = "^2"

# Workflow-security rules enforce the structural properties defined by the
# `ci-workflow-hardening` capability. Each rule below maps to a requirement in that spec
[lint.rules]
# "Untrusted code is not executed with privileged context" — privileged job
# checking out PR HEAD. Both jobs below match the pattern but are fork-gated
# (`head.repo.full_name == github.repository`), so PR HEAD is only ever checked
# out for same-repo branches — never attacker-controlled fork code — and the
# 'pwn request' path is unreachable. gx's static check can't see the `if:` gate.
#   - gx.yml `tidy`: lockfile tidy on same-repo PRs.
#   - update-docs.yml `generate`: regenerates committed docs output onto the PR
#     branch (maintainer / renovate[bot] only). Needs write + PR-head checkout.
#     The `check` job in the same workflow is token-free and triggers no rule.
pr-head-checkout = { level = "error", ignore = [
    { workflow = ".github/workflows/gx.yml" },
    { workflow = ".github/workflows/update-docs.yml" },
] }

# "Every workflow declares a minimum-scope permissions block" — windows-image.yml
# is a reusable (`workflow_call`) workflow. A reusable workflow's declared
# `permissions:` act as a ceiling that cannot exceed the caller's grant and
# silently downgrades it, so a block here would either cap the release caller's
# `packages: write` (breaking the GHCR push) or hard-fail the PR caller at
# startup ("requesting packages: write, but only allowed packages: none"). The
# token scope is still explicit — declared at each caller (windows.yml:
# `contents: read`; release.yml `release-windows`: `packages: write`) — and the
# reusable workflow inherits it. So the missing block is intentional and safe.
missing-permissions = { level = "error", ignore = [
    { workflow = ".github/workflows/windows-image.yml" },
] }
