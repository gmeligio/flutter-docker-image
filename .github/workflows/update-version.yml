name: Update version

on:
  schedule:
    - cron: '0 0 * * MON-FRI'
  workflow_dispatch:

# Declare default permissions as read only.
permissions:
  contents: read

# Mutates shared state (opens a PR to bump versions); serialize to avoid two scheduled runs racing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Resolves the bootstrap container tag — the latest published release tag.
  setup:
    name: Read latest release
    runs-on: ubuntu-24.04
    outputs:
      flutter_version: ${{ steps.read.outputs.version }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Read latest release tag
        id: read
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(gh api "repos/${{ github.repository }}/releases/latest" --jq '.tag_name')
          echo "version=$version" >> "$GITHUB_OUTPUT"

  update-flutter-version:
    name: Update Flutter version
    permissions:
      # Allow to write contents to push commits
      contents: write
      # Allow to write pull requests to push commits and write comments
      pull-requests: write
    runs-on: ubuntu-24.04
    outputs:
      new_version: ${{ steps.update_flutter_version.outputs.result }}
      flutter_version: ${{ steps.update_flutter_version.outputs.version }}
      flutter_channel: ${{ steps.update_flutter_version.outputs.channel }}
      flutter_commit: ${{ steps.update_flutter_version.outputs.commit }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Resolve latest Flutter version
        id: update_flutter_version
        run: |
          releases_json_path="${RUNNER_TEMP}/releases.json"
          curl -fsSL https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json \
            -o "$releases_json_path"

          old_version=$(jq -r '.flutter.version' config/version.json)
          new_version=$(jq -r '[.releases[] | select(.channel=="stable")] | max_by(.release_date) | .version' "$releases_json_path")
          new_channel=$(jq -r '[.releases[] | select(.channel=="stable")] | max_by(.release_date) | .channel' "$releases_json_path")
          new_commit=$(jq -r '[.releases[] | select(.channel=="stable")] | max_by(.release_date) | .hash' "$releases_json_path")

          echo "Current pinned version: $old_version"
          echo "Latest upstream stable version: $new_version (channel: $new_channel)"

          if [ "$old_version" = "$new_version" ]; then
            echo "No version change — skipping update."
            echo "result=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $new_version (channel: $new_channel)"
            {
              echo "result=true"
              echo "version=$new_version"
              echo "channel=$new_channel"
              echo "commit=$new_commit"
            } >> "$GITHUB_OUTPUT"
          fi

      # Validate the resolved Flutter block in isolation — the only data this job
      # owns. compose-version-manifest overlays it onto config/version.json, which
      # validate-config-version then re-checks as a whole #Version manifest.
      - name: Validate resolved Flutter block with CUE
        if: ${{ steps.update_flutter_version.outputs.result == 'true' }}
        env:
          FLUTTER_CHANNEL: ${{ steps.update_flutter_version.outputs.channel }}
          FLUTTER_COMMIT: ${{ steps.update_flutter_version.outputs.commit }}
          FLUTTER_VERSION: ${{ steps.update_flutter_version.outputs.version }}
        run: |
          jq -n --arg channel "$FLUTTER_CHANNEL" --arg commit "$FLUTTER_COMMIT" --arg version "$FLUTTER_VERSION" \
            '{flutter: {channel: $channel, commit: $commit, version: $version}}' > "${RUNNER_TEMP}/flutter.json"
          cue vet config/schema.cue -d '#FlutterVersion' "${RUNNER_TEMP}/flutter.json"

  update-windows-version:
    name: Update Windows version
    permissions:
      contents: write
    needs: update-flutter-version
    if: ${{ needs.update-flutter-version.outputs.new_version == 'true' }}
    outputs:
      version_artifact_id: ${{ steps.upload-version.outputs.artifact-id }}
      # 'true' whenever no fragment was produced: either the release-identity check
      # didn't match, or it matched but a later step failed before the upload ran.
      windows_skipped: ${{ (steps.release_identity.outputs.matched == 'true' && steps.upload-version.outcome == 'success') && 'false' || 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Resolve latest Git for Windows version
        id: git_version
        run: |
          tag=$(curl -fsSL https://api.github.com/repos/git-for-windows/git/releases/latest | jq -r '.tag_name')
          version=${tag#v}
          version=${version%.windows.*}
          echo "git_version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved Git for Windows version: $version"

      - name: Fetch VS channel manifest
        run: curl -fsSL https://aka.ms/vs/17/release/channel -o channel.json

      # channel.json is a discovery document — it points to vsman.json (which
      # holds per-component versions). We do not byte-pin against channel.json's
      # sha256: Microsoft generates channel.json against a pretty-printed vsman
      # and serves a minified vsman, so byte equality is not preserved upstream.
      # Integrity is enforced semantically by the release-identity check below.
      # See openspec/changes/p11-resilient-windows-update/design.md.
      - name: Download VS catalog manifest
        run: |
          url=$(jq -r '.channelItems[] | select(.id=="Microsoft.VisualStudio.Manifests.VisualStudio") | .payloads[0].url' channel.json)
          curl -fsSL "$url" -o vsman.json

      # channel.json describes Microsoft's *intent* (the current release);
      # vsman.json is the actual data. When the two agree on
      # info.productSemanticVersion, Microsoft's release pipeline is consistent
      # and the extracted versions are safe to use. When they disagree (mid-
      # publish, etc.), skip the Windows update for this cycle — the PR job
      # carries forward the existing committed windows block unchanged.
      - name: Verify channel and vsman describe the same release
        id: release_identity
        run: |
          channel_ver=$(jq -r '.info.productSemanticVersion' channel.json)
          vsman_ver=$(jq -r '.info.productSemanticVersion' vsman.json)
          if [ "$channel_ver" = "$vsman_ver" ]; then
            echo "matched=true" >> "$GITHUB_OUTPUT"
            echo "Release identity matches: $channel_ver"
          else
            echo "matched=false" >> "$GITHUB_OUTPUT"
            echo "::warning::release identity mismatch — skipping Windows update this cycle (channel=$channel_ver vsman=$vsman_ver)"
          fi

      - name: Resolve VS BuildTools component versions
        if: steps.release_identity.outputs.matched == 'true'
        id: vs_versions
        run: |
          cmake=$(jq -r '.packages[] | select(.id=="Microsoft.VisualStudio.Component.VC.CMake.Project") | .version' vsman.json)
          vctools=$(jq -r '.packages[] | select(.id=="Microsoft.VisualStudio.Workload.VCTools") | .version' vsman.json)
          echo "cmake=$cmake" >> "$GITHUB_OUTPUT"
          echo "vctools=$vctools" >> "$GITHUB_OUTPUT"
          echo "CMake: $cmake; VCTools: $vctools"

      - name: Write windows block into config/version.json
        if: steps.release_identity.outputs.matched == 'true'
        env:
          GIT_VERSION: ${{ steps.git_version.outputs.git_version }}
          VS_CMAKE_VERSION: ${{ steps.vs_versions.outputs.cmake }}
          VS_VCTOOLS_VERSION: ${{ steps.vs_versions.outputs.vctools }}
        run: |
          # Win11SDK build id is human-pinned (changes infrequently; tied to OS branding).
          win11sdk_build=$(jq -r '.windows.vsBuildTools.windows11Sdk.build' config/version.json)
          jq --arg git "$GIT_VERSION" \
             --arg cmake "$VS_CMAKE_VERSION" \
             --arg vctools "$VS_VCTOOLS_VERSION" \
             --argjson sdkbuild "$win11sdk_build" \
             '.windows = {
                git: {version: $git},
                vsBuildTools: {
                  cmakeProject: {version: $cmake},
                  windows11Sdk: {build: $sdkbuild},
                  vcTools: {version: $vctools}
                }
              }' config/version.json > config/version.json.tmp
          mv config/version.json.tmp config/version.json

      - name: Validate version.json with CUE
        if: steps.release_identity.outputs.matched == 'true'
        run: cue vet config/schema.cue -d '#Version' config/version.json

      # The artifact's file is renamed so it doesn't collide with the Android
      # artifact's version.json in update-docs-and-create-pr's merge step.
      - name: Stage windows-only artifact
        if: steps.release_identity.outputs.matched == 'true'
        run: cp config/version.json "${RUNNER_TEMP}/version.json.windows"

      - name: Upload artifact with the updated windows block
        if: steps.release_identity.outputs.matched == 'true'
        id: upload-version
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: version.json.windows
          path: ${{ runner.temp }}/version.json.windows

      # Forensic upload runs on every outcome (matched/skipped/job-error) so the
      # exact channel.json and vsman.json that drove the decision are preserved
      # for retroactive inspection. Only runs if both files exist on disk (they
      # do whenever the download steps completed before this step is reached).
      - name: Upload VS manifest artifacts for forensics
        if: always() && hashFiles('channel.json', 'vsman.json') != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: vs-manifests
          path: |
            channel.json
            vsman.json

  update-android-version:
    name: Update Android version
    permissions:
      # Allow to write contents to push commits
      contents: write
      # Allow to read packages to pull the container image from GitHub Container Registry
      packages: read
      # Allow to write pull requests to create a pull request
      pull-requests: write
    needs: [setup, update-flutter-version]
    if: ${{ needs.update-flutter-version.outputs.new_version == 'true' }}
    outputs:
      version_artifact_id: ${{ steps.upload-version.outputs.artifact-id }}
      android_test_artifact_id: ${{ steps.upload-android-test.outputs.artifact-id }}
      # 'true' whenever the fragment upload did not run (job failed before reaching
      # it), so compose-version-manifest carries forward the base android+fastlane.
      android_skipped: ${{ steps.upload-version.outcome == 'success' && 'false' || 'true' }}
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/flutter-android:${{ needs.setup.outputs.flutter_version }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      # The Flutter version/channel come straight from update-flutter-version's
      # outputs (the job that resolved the bump); the Setup Flutter and Gradle steps
      # below consume them. compose-version-manifest folds the Flutter block into
      # config/version.json centrally.
      - name: Export FLUTTER_* environment variables
        run: |
          echo "FLUTTER_VERSION=${{ needs.update-flutter-version.outputs.flutter_version }}" >> "$GITHUB_ENV"
          echo "FLUTTER_CHANNEL=${{ needs.update-flutter-version.outputs.flutter_channel }}" >> "$GITHUB_ENV"

      - name: Update latest Fastlane version
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const script = require('./script/updateFastlaneVersion.js')
            await script({core, fetch})

      - name: Setup Flutter
        run: |
          cd "$FLUTTER_ROOT"
          git fetch origin ${{ env.FLUTTER_VERSION }}:${{ env.FLUTTER_VERSION }}
          git switch --discard-changes ${{ env.FLUTTER_VERSION }}

      # TODO: Create test app in specific folder with step id, to allow parallel execution
      - name: Create test application
        run: |
          flutter create test_app

      # TODO: Cache gradle https://github.com/gradle/gradle-build-action
      - name: Update default Android platform versions in Flutter
        working-directory: test_app/android
        run: |
          cat ../../script/updateAndroidVersions.gradle.kts >> app/build.gradle.kts
          ./gradlew --warning-mode all updateAndroidVersions

      - name: Clean test application
        run: |
          rm -rf test_app

      - name: Generate test files with CUE
        run: |
          ./script/update_test.sh

      # No #Android definition exists in the schema, so validate the full in-job
      # manifest: the android + fastlane blocks were written onto the schema-valid
      # base checkout, so a passing #Version confirms this producer's blocks.
      - name: Validate version.json with CUE
        run: cue vet config/schema.cue -d '#Version' config/version.json

      # Emit a fragment carrying only this producer's blocks (android + fastlane).
      # Both are written by this job, so both ride the fragment; compose-version-
      # manifest overlays them onto the base manifest. The file name disambiguates
      # from the Windows fragment when both are downloaded with merge-multiple.
      - name: Stage android-only fragment
        run: jq '{android, fastlane}' config/version.json > "${RUNNER_TEMP}/version.json.android"

      - name: Upload artifact with the updated android block
        id: upload-version
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: version.json.android
          path: ${{ runner.temp }}/version.json.android

      - name: Upload the test artifact for Android
        id: upload-android-test
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: android.yml
          path: test/android.yml

  # Overlays each platform's data onto the schema-valid base manifest; a skipped
  # platform uploads no fragment, so the android/windows overlays are individually
  # guarded. Gated on new_version == 'true' because the Flutter overlay is
  # unconditional — it always applies the resolved Flutter block from the resolver
  # job's outputs. Sole composer of config/version.json; validate-config-version
  # gates the result.
  compose-version-manifest:
    name: Compose version manifest
    needs: [update-flutter-version, update-android-version, update-windows-version]
    if: ${{ !cancelled() && needs.update-flutter-version.outputs.new_version == 'true' }}
    runs-on: ubuntu-24.04
    outputs:
      composed_artifact_id: ${{ steps.upload-composed.outputs.artifact-id }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Base-branch checkout is the composition canvas: its config/version.json and
      # test/android.yml are schema-valid (enforced by build.yml on every merge),
      # so any block carried forward is by definition a previously-validated block.
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      # Compose the artifact-ids list with the Android and Windows fragment ids
      # appended only when their producer jobs actually uploaded one. An empty id
      # is omitted (download-artifact rejects empty entries). The android fragment
      # also carries android.yml's producer; its test artifact id is handled separately.
      - name: Compose fragment artifact id list
        id: fragment_ids
        env:
          ANDROID_ID: ${{ needs.update-android-version.outputs.version_artifact_id }}
          WINDOWS_ID: ${{ needs.update-windows-version.outputs.version_artifact_id }}
          ANDROID_TEST_ID: ${{ needs.update-android-version.outputs.android_test_artifact_id }}
        run: |
          ids=""
          [ -n "${ANDROID_ID}" ] && ids="${ids:+$ids,}${ANDROID_ID}"
          [ -n "${WINDOWS_ID}" ] && ids="${ids:+$ids,}${WINDOWS_ID}"
          [ -n "${ANDROID_TEST_ID}" ] && ids="${ids:+$ids,}${ANDROID_TEST_ID}"
          echo "ids=${ids}" >> "$GITHUB_OUTPUT"
          echo "Fragment artifact ids: ${ids:-<none>}"

      # Download whatever fragments exist (android, windows, android.yml). Distinct
      # filenames (version.json.android, version.json.windows, android.yml) make
      # merge-multiple safe. When the list is empty, the step is skipped and the
      # base-branch copies are used as-is.
      - name: Download available fragments
        if: steps.fragment_ids.outputs.ids != ''
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          artifact-ids: ${{ steps.fragment_ids.outputs.ids }}
          path: ${{ runner.temp }}/fragments
          merge-multiple: true

      # Overlay each block in turn. Flutter always overlays; android (+fastlane)
      # and windows overlay only when their fragment was downloaded, else the base
      # block carries forward. android.yml is replaced only when its fragment exists.
      - name: Compose manifest
        env:
          FRAGMENTS: ${{ runner.temp }}/fragments
          FLUTTER_CHANNEL: ${{ needs.update-flutter-version.outputs.flutter_channel }}
          FLUTTER_COMMIT: ${{ needs.update-flutter-version.outputs.flutter_commit }}
          FLUTTER_VERSION: ${{ needs.update-flutter-version.outputs.flutter_version }}
        run: |
          # Flutter — always overlaid from the resolver job's outputs.
          jq --arg channel "$FLUTTER_CHANNEL" --arg commit "$FLUTTER_COMMIT" --arg version "$FLUTTER_VERSION" \
            '.flutter = {channel: $channel, commit: $commit, version: $version}' config/version.json > config/version.json.tmp
          mv config/version.json.tmp config/version.json

          # Android + fastlane — when the fragment was produced this cycle.
          if [ -f "${FRAGMENTS}/version.json.android" ]; then
            jq -s '.[0] + {android: .[1].android, fastlane: .[1].fastlane}' \
              config/version.json "${FRAGMENTS}/version.json.android" > config/version.json.tmp
            mv config/version.json.tmp config/version.json
            echo "Overlaid android + fastlane from fragment."
          else
            echo "No android fragment — carrying forward base android + fastlane."
          fi

          # Windows — when the fragment was produced this cycle.
          if [ -f "${FRAGMENTS}/version.json.windows" ]; then
            jq -s '.[0] + {windows: .[1].windows}' \
              config/version.json "${FRAGMENTS}/version.json.windows" > config/version.json.tmp
            mv config/version.json.tmp config/version.json
            echo "Overlaid windows from fragment."
          else
            echo "No windows fragment — carrying forward base windows."
          fi

          # test/android.yml — replace with the fresh one when Android produced it.
          if [ -f "${FRAGMENTS}/android.yml" ]; then
            cp "${FRAGMENTS}/android.yml" test/android.yml
            echo "Replaced test/android.yml from fragment."
          else
            echo "No android.yml fragment — carrying forward base test/android.yml."
          fi

      # Upload the composed manifest + test file as a single artifact. This is the
      # exact byte content that becomes the PR's config/version.json and test/android.yml.
      - name: Upload composed manifest
        id: upload-composed
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: composed-manifest
          path: |
            config/version.json
            test/android.yml

  validate-config-version:
    name: Validate config version
    needs: compose-version-manifest
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      # TODO: Workaround because actions/download-artifact can't overwrite existing files
      # Check if this workaround can be removed after the following issues are fixed:
      # https://github.com/actions/download-artifact/issues/225
      # https://github.com/actions/download-artifact/issues/138
      - name: Delete version.json and android.yml
        run: rm config/version.json test/android.yml

      # Validate the COMPOSED manifest — the only version of config/version.json
      # that becomes the PR's content. The composed-manifest artifact unpacks
      # config/version.json and test/android.yml at their repo-relative paths.
      - name: Download composed manifest
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          artifact-ids: ${{ needs.compose-version-manifest.outputs.composed_artifact_id }}
          path: .

      - name: Validate version.json with CUE
        run: cue vet config/schema.cue -d '#Version' config/version.json

  update-docs-and-create-pr:
    name: Update docs and create PR
    # Platform updaters stay in needs: only so their <platform>_skipped outputs
    # are readable for PR-body annotation; the data consumed is composed-manifest.
    needs:
      - update-flutter-version
      - update-android-version
      - update-windows-version
      - compose-version-manifest
      - validate-config-version
    # Open the PR whenever Flutter changed, composition succeeded, and validation
    # passed. Either platform updater skipping (android or windows) is fine — its
    # block was carried forward by compose-version-manifest. The gate is the
    # composed-and-validated manifest, not the individual platform jobs.
    if: |
      !cancelled() &&
      needs.update-flutter-version.result == 'success' &&
      needs.compose-version-manifest.result == 'success' &&
      needs.validate-config-version.result == 'success'
    runs-on: ubuntu-24.04
    env:
      IMAGE_REPOSITORY_NAME: flutter-android
      VERSION_MANIFEST: config/version.json
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          # git-cliff needs full commit history and all tags to generate the changelog.
          fetch-depth: 0
          fetch-tags: true

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      # TODO: Workaround because actions/download-artifact can't overwrite existing files
      # Check if this workaround can be removed after the following issues are fixed:
      # https://github.com/actions/download-artifact/issues/225
      # https://github.com/actions/download-artifact/issues/138
      - name: Delete version.json and android.yml
        run: |-
          rm config/version.json test/android.yml

      # Read-only consumer: download the single composed-and-validated manifest.
      # No jq, no overlay, no re-validation — compose-version-manifest produced it
      # and validate-config-version already gated it. The artifact unpacks
      # config/version.json and test/android.yml at their repo-relative paths.
      - name: Download composed manifest
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          artifact-ids: ${{ needs.compose-version-manifest.outputs.composed_artifact_id }}
          path: .

      - name: Update documentation
        run: mise run docs

      - name: Read environment variables from the version manifest
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          IMAGE_REPOSITORY_NAME: ${{ env.IMAGE_REPOSITORY_NAME }}
          VERSION_MANIFEST: ${{ env.VERSION_MANIFEST }}
        with:
          script: |
            const script = require('./script/setEnvironmentVariables.js')
            return await script({ core })

      - name: Create commit message variable
        id: create_commit_message
        run: |
          commit_message="chore(release): upgrade flutter to ${{ env.FLUTTER_VERSION }}"
          echo "commit_message=$commit_message" >> "$GITHUB_OUTPUT"
          echo "Commit message: $commit_message"

      # Annotate each platform that did not update this cycle (skipped output set,
      # or job not successful), so the reviewer sees which blocks were carried
      # forward without digging through job logs. Android and Windows are treated
      # symmetrically.
      - name: Compose PR body
        id: pr_body
        env:
          ANDROID_SKIPPED: ${{ needs.update-android-version.outputs.android_skipped }}
          ANDROID_RESULT: ${{ needs.update-android-version.result }}
          WINDOWS_SKIPPED: ${{ needs.update-windows-version.outputs.windows_skipped }}
          WINDOWS_RESULT: ${{ needs.update-windows-version.result }}
          JOB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "body<<PR_BODY_EOF"
            echo "Automated upgrade PR opened by \`update-version.yml\`."
            if [ "${ANDROID_SKIPPED}" = "true" ] || [ "${ANDROID_RESULT}" != "success" ]; then
              echo ""
              echo "**Android toolchain unchanged this cycle.** See [\`update-android-version\` job log](${JOB_RUN_URL}) — the committed \`android\` block in \`config/version.json\` is carried forward unchanged."
            fi
            if [ "${WINDOWS_SKIPPED}" = "true" ] || [ "${WINDOWS_RESULT}" != "success" ]; then
              echo ""
              echo "**Windows toolchain unchanged this cycle.** See [\`update-windows-version\` job log](${JOB_RUN_URL}) — the committed \`windows\` block in \`config/version.json\` is carried forward unchanged."
            fi
            echo "PR_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate authentication token with GitHub App to trigger Actions
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ secrets.VERIFIED_COMMIT_ID }}
          private-key: ${{ secrets.VERIFIED_COMMIT_KEY }}
          repositories: ${{ github.event.repository.name }}
          owner: ${{ github.repository_owner }}

      # Regenerate the changelog for the new version so it rides in the same PR as
      # the version bump. The committed changelog is documentation only (release.yml
      # regenerates its own notes from history at release time); generating it here
      # lets prepare-release.yml stay a pure tag-creation step with no direct push.
      - name: Generate changelog for the new version
        run: |
          git-cliff -v --tag ${{ env.FLUTTER_VERSION }} --github-repo ${{ github.repository }} --output changelog.md

      - name: Create pull request if there are changes
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          commit-message: ${{ steps.create_commit_message.outputs.commit_message }}
          branch: update-flutter-dependencies/${{ env.FLUTTER_VERSION }}
          sign-commits: true
          title: ${{ steps.create_commit_message.outputs.commit_message }}
          body: ${{ steps.pr_body.outputs.body }}
          token: ${{ steps.app-token.outputs.token }}
