name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

# Read-only permissions by default
permissions:
  contents: read

# Release path: serialize, don't cancel — a superseded release run could leave a half-published image set.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: ${{ github.ref_name }}

jobs:
  release-linux:
    name: Release ${{ matrix.name }}
    if: github.event_name == 'push'
    permissions:
      # Allow to write packages to push the container image to the Github Container Registry
      packages: write
    runs-on: ubuntu-24.04
    # One leg per published Linux image, both from android.Dockerfile.
    # `target` selects the stage; `name` is the published repository. Legs are
    # independent (fail-fast: false) so one image can publish if another fails.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: flutter-android
            target: android
          - name: flutter-web
            target: web
    env:
      IMAGE_REPOSITORY_NAME: ${{ matrix.name }}
      ANDROID_BUILD_TOOLS_VERSION: 30.0.3
      VERSION_MANIFEST: config/version.json
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Read environment variables from the version manifest
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          IMAGE_REPOSITORY_NAME: ${{ env.IMAGE_REPOSITORY_NAME }}
          VERSION_MANIFEST: ${{ env.VERSION_MANIFEST }}
        with:
          script: |
            const script = require('./script/setEnvironmentVariables.js')
            return await script({ core })

      - name: Load image metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        id: metadata
        with:
          images: |
            ${{ env.IMAGE_REPOSITORY_PATH }}
            ghcr.io/${{ env.IMAGE_REPOSITORY_PATH }}
            quay.io/${{ env.IMAGE_REPOSITORY_PATH }}
          tags: |
            type=raw,value=${{ env.FLUTTER_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
        with:
          buildkitd-flags: --debug

      - name: Login to Docker Hub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Quay.io
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Build image and push it to registries
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          file: android.Dockerfile
          push: true
          # Scope the gha cache per image so the two matrix legs don't share
          # (and clobber) one cache key.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          labels: ${{ steps.metadata.outputs.labels }}
          tags: ${{ steps.metadata.outputs.tags }}
          target: ${{ matrix.target }}
          # The android build-args are inert for the web target (its stage
          # declares none of them), so a single shared block serves both legs.
          build-args: |
            flutter_version=${{ env.FLUTTER_VERSION }}
            fastlane_version=${{ env.FASTLANE_VERSION }}
            android_build_tools_version=${{ env.ANDROID_BUILD_TOOLS_VERSION }}
            android_platform_versions=${{ env.ANDROID_PLATFORM_VERSIONS }}
            android_ndk_version=${{ env.ANDROID_NDK_VERSION }}
            cmake_version=${{ env.CMAKE_VERSION }}

  release-windows:
    name: Release Windows
    permissions:
      contents: read
      # Allow to write packages to push the container image to the Github Container Registry
      packages: write
    # Push path: build the `flutter` target. Runs in parallel with
    # release-linux (no `needs`).
    uses: ./.github/workflows/windows-image.yml
    with:
      target: flutter
      push: true
    secrets:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_ROBOT_TOKEN: ${{ secrets.QUAY_ROBOT_TOKEN }}

  verify-published:
    name: Verify ${{ matrix.name }} is anonymously pullable
    # Verify whatever actually published. "Did it publish?" is read from the
    # registry by an anonymous pull (script/verify_published_image.sh), never
    # inferred from which release job succeeded — that job-result coupling is
    # what let this job drift (the dangling `release-android` reference, the
    # silently unverified web image). So there is no per-image gating: one
    # platform failing leaves only its own matrix leg red while the images that
    # did publish verify independently. Fix-forward a failed platform by
    # re-pushing the tag; this re-runs and the leg turns green once it's live.
    needs: [release-linux, release-windows]
    # !cancelled() so a failed release job doesn't skip verification of the ones
    # that succeeded. Scoped to push, the path on which all images are built.
    if: ${{ github.event_name == 'push' && !cancelled() }}
    runs-on: ubuntu-24.04
    # One leg per published image. Adding an image to the release is one matrix
    # entry here. fail-fast: false so every image is checked even if one fails.
    strategy:
      fail-fast: false
      matrix:
        name:
          - flutter-android
          - flutter-web
          - flutter-windows
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      # No registry login on purpose: this must verify an anonymous `docker pull`
      # succeeds, not pass on the strength of CI's own credentials.
      - name: Verify ${{ matrix.name }} across all registries
        env:
          TAG: ${{ env.FLUTTER_VERSION }}
          OWNER: ${{ github.repository_owner }}
          IMAGE: ${{ matrix.name }}
        run: |
          for registry in docker.io ghcr.io quay.io; do
            ./script/verify_published_image.sh "$registry" "$OWNER/$IMAGE" "$TAG"
          done

  update-description:
    name: Update Docker Hub description (${{ matrix.name }})
    runs-on: ubuntu-24.04
    needs: release-linux
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: flutter-android
          - name: flutter-web
    env:
      IMAGE_REPOSITORY_NAME: ${{ matrix.name }}
      VERSION_MANIFEST: config/version.json
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Read environment variables from the version manifest
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          IMAGE_REPOSITORY_NAME: ${{ env.IMAGE_REPOSITORY_NAME }}
          VERSION_MANIFEST: ${{ env.VERSION_MANIFEST }}
        with:
          script: |
            const script = require('./script/setEnvironmentVariables.js')
            return await script({ core })

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
          repository: ${{ env.IMAGE_REPOSITORY_PATH }}
          short-description: ${{ github.event.repository.description }}
          readme-filepath: readme.md

  record-image:
    name: Record image in Scout (${{ matrix.name }})
    permissions:
      # Allow to write code scanning results to GitHub's code scanning dashboard
      security-events: write
    runs-on: ubuntu-24.04
    needs: release-linux
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: flutter-android
          - name: flutter-web
    env:
      IMAGE_REPOSITORY_NAME: ${{ matrix.name }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Login to Docker Hub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Record image in Docker Scout environment
        uses: docker/scout-action@f8c776824083494ab0d56b8105ba2ca85c86e4de # v1.18.2
        with:
          command: environment, cves
          image: registry://${{ github.repository_owner }}/${{ env.IMAGE_REPOSITORY_NAME }}:${{ env.FLUTTER_VERSION }}
          environment: prod
          only-fixed: true
          organization: ${{ secrets.DOCKER_HUB_USERNAME }}
          sarif-file: sarif.json

      - name: Upload the results to GitHub's code scanning dashboard
        uses: github/codeql-action/upload-sarif@cf1bb45a277cb3c205638b2cd5c984db1c46a412 # v4.31.7
        with:
          sarif_file: sarif.json
          # Distinct category per image so the two matrix legs' SARIF uploads
          # coexist on the code-scanning dashboard instead of overwriting.
          category: ${{ matrix.name }}

  create-github-release:
    name: Create GitHub release
    permissions:
      # Allow to create releases and upload assets to them
      contents: write
    runs-on: ubuntu-24.04
    needs: release-linux
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          # TODO: Fetch only a few commits after using --unreleased in git-cliff
          # Fetch all commits to use as input for the changelog generation
          fetch-depth: 0
          # Fetch all tags to use as input for the changelog generation
          fetch-tags: true

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Get the tag details
        id: get-tag-details
        run: |-
          # Store the changelog in a temporary directory to not pollute the working directory
          mkdir -p "${{ runner.temp }}/git-cliff"
          changelog_file="${{ runner.temp }}/git-cliff/changelog.md"
          echo "changelog_file=${changelog_file}" >> "$GITHUB_OUTPUT"

          git-cliff -v --latest --strip all --no-exec --github-repo "${{ github.repository }}" --output "$changelog_file"

      - name: Create Github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |-
          gh release create "${{ env.FLUTTER_VERSION }}" \
            --title="${{ env.FLUTTER_VERSION }}" \
            --notes-file="${{ steps.get-tag-details.outputs.changelog_file }}"
