name: Windows

on:
  pull_request:
  workflow_dispatch:

# Read-only permissions by default
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-windows:
    name: Test Windows image
    # Test path runs the Pester suite and never logs in, so no secrets are passed.
    uses: ./.github/workflows/windows-image.yml
    with:
      target: test
      push: false
