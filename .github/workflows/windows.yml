name: Windows

on:
  pull_request:
  workflow_dispatch:

# Read-only permissions by default
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-windows:
    name: Test Windows image
    # Build the `test` target and run the Pester suite via the shared workflow.
    # No secrets are forwarded: the test path performs no registry login.
    uses: ./.github/workflows/windows-image.yml
    with:
      target: test
      push: false
