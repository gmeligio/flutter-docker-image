name: Windows image

# Reusable workflow that owns the entire shared Windows image build. Both the
# PR test path (windows.yml) and the release path (release.yml) call this with
# uses:, differing only in `target` and `push`. See the windows-image-build
# capability spec.
on:
  workflow_call:
    inputs:
      target:
        description: 'Dockerfile stage to build (`test` or `flutter`).'
        required: true
        type: string
      push:
        description: >-
          When true, log in to the registries and push the built tags. When
          false (PR test path), run the Pester suite and perform no login.
        required: true
        type: boolean
    secrets:
      DOCKER_HUB_USERNAME:
        required: false
      DOCKER_HUB_TOKEN:
        required: false
      QUAY_USERNAME:
        required: false
      QUAY_ROBOT_TOKEN:
        required: false

# Read-only permissions by default
permissions:
  contents: read

jobs:
  build:
    name: Build Windows image
    runs-on: windows-2025
    permissions:
      contents: read
      # packages: write is needed to push to GHCR on the release path; the
      # effective grant is the intersection with the caller job's permissions,
      # so the PR caller (contents: read) never receives write.
      packages: write
    env:
      IMAGE_REPOSITORY_NAME: flutter-windows
      VERSION_MANIFEST: config/version.json
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Clean runner disk
        uses: ./.github/actions/clean-runner-disk

      # Workaround for actions/runner-images#13729: Docker service does not
      # always auto-start on windows-2022/2025 runners. Start it explicitly
      # and wait until the daemon answers before invoking `docker build`.
      - name: Ensure Docker daemon is running
        shell: powershell
        run: |
          $svc = Get-Service docker -ErrorAction SilentlyContinue
          if (-not $svc) {
            Write-Error "docker service not found on runner"
            exit 1
          }
          if ($svc.Status -ne 'Running') {
            Write-Host "docker service status: $($svc.Status); starting..."
            Start-Service docker
          }
          for ($i = 0; $i -lt 30; $i++) {
            docker version --format '{{.Server.Version}}' 2>$null
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Start-Sleep -Seconds 2
          }
          Write-Error "docker daemon did not become ready within 60s"
          exit 1

      - name: Read environment variables from the version manifest
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          IMAGE_REPOSITORY_NAME: ${{ env.IMAGE_REPOSITORY_NAME }}
          VERSION_MANIFEST: ${{ env.VERSION_MANIFEST }}
        with:
          script: |
            const script = require('./script/setEnvironmentVariables.js')
            return await script({ core })

      - name: Load image metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        id: metadata
        with:
          images: |
            ${{ env.IMAGE_REPOSITORY_PATH }}
            ghcr.io/${{ env.IMAGE_REPOSITORY_PATH }}
            quay.io/${{ env.IMAGE_REPOSITORY_PATH }}
          tags: |
            type=raw,value=${{ env.FLUTTER_VERSION }}

      # Logins run only on the push path. The PR test path contacts no registry
      # (base image from mcr.microsoft.com, Pester from PSGallery, test runs the
      # local image), so a fork PR builds and tests with zero login steps.
      - name: Login to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Quay.io
        if: ${{ inputs.push }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      # Docker Buildx is not supported for Windows containers, so build with a
      # direct docker build command.
      - name: Build image
        shell: powershell
        env:
          METADATA_TAGS: ${{ steps.metadata.outputs.tags }}
          METADATA_LABELS: ${{ steps.metadata.outputs.labels }}
          BUILD_TARGET: ${{ inputs.target }}
        run: |
          $tags = $env:METADATA_TAGS -split "`r?`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          $labels = $env:METADATA_LABELS -split "`r?`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }

          $tagArgs = $tags | ForEach-Object { "--tag=$_" }
          $labelArgs = $labels | ForEach-Object { "--label=$_" }

          $buildArgs = $tagArgs + $labelArgs + @(
            '--build-arg', "flutter_version=${{ env.FLUTTER_VERSION }}",
            '--build-arg', "git_version=${{ env.GIT_VERSION }}",
            '--build-arg', "vs_cmake_version=${{ env.VS_CMAKE_VERSION }}",
            '--build-arg', "vs_win11sdk_build=${{ env.VS_WIN11SDK_BUILD }}",
            '--build-arg', "vs_vctools_version=${{ env.VS_VCTOOLS_VERSION }}",
            '--target', "$env:BUILD_TARGET",
            '--file', 'windows.Dockerfile',
            '.'
          )

          docker build @buildArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Push image to registries
        if: ${{ inputs.push }}
        shell: powershell
        env:
          METADATA_TAGS: ${{ steps.metadata.outputs.tags }}
        run: |
          $tags = $env:METADATA_TAGS -split "`r?`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          foreach ($tag in $tags) {
            docker push $tag
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      # Test path: run the locally-built `test` image, which overrides the
      # entrypoint to RunPester.ps1. The image bakes in config/version.json and
      # the test files, so no env/volumes are needed. Propagate the container
      # exit code so a failing Pester test fails the job.
      - name: Run Pester tests
        if: ${{ !inputs.push }}
        shell: powershell
        env:
          METADATA_TAGS: ${{ steps.metadata.outputs.tags }}
        run: |
          $tags = $env:METADATA_TAGS -split "`r?`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          docker run --rm $tags[0]
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
