name: Prepare release

# Two-pass, event-driven release prep (see openspec p10 design D1a):
#   Pass 1 — push to main changes config/version.json:
#            update-changelog opens a PR with the regenerated changelog.md.
#   Pass 2 — that PR merges, changing changelog.md on main:
#            create-tag tags the merged commit; the tag push triggers release.yml.
# Neither job pushes directly to main — every write lands through a PR.
on:
  push:
    branches:
      - main
    paths:
      - config/version.json
      - changelog.md
  workflow_dispatch:

# Read-only by default; the PR-creation and tag-creation steps use a GitHub App token, not GITHUB_TOKEN.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Decide which pass we are in by diffing the push range — which file changed
  # determines whether we open the changelog PR or tag the merged commit. Uses
  # native git (no third-party action) against github.event.before, which push
  # events always set. workflow_dispatch falls through as the version.json pass.
  detect:
    name: Detect changed file
    runs-on: ubuntu-24.04
    outputs:
      changelog_changed: ${{ steps.diff.outputs.changelog }}
      version_changed: ${{ steps.diff.outputs.version }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Diff the push range
        id: diff
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          # On push, BEFORE is the prior tip of main; fall back to first-parent
          # if it is the zero SHA (e.g. branch creation).
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$AFTER^"
          fi
          changed="$(git diff --name-only "$BEFORE" "$AFTER")"
          echo "$changed"
          grep -qx 'changelog.md' <<<"$changed" && echo "changelog=true" >> "$GITHUB_OUTPUT" || echo "changelog=false" >> "$GITHUB_OUTPUT"
          grep -qx 'config/version.json' <<<"$changed" && echo "version=true" >> "$GITHUB_OUTPUT" || echo "version=false" >> "$GITHUB_OUTPUT"

  # Pass 1: write changelog.md for the new version and open a PR.
  # Runs on the version.json push or a manual dispatch — NOT on the changelog merge.
  update-changelog:
    name: Update changelog
    needs: detect
    if: github.event_name == 'workflow_dispatch' || needs.detect.outputs.version_changed == 'true'
    runs-on: ubuntu-24.04
    env:
      IMAGE_REPOSITORY_NAME: flutter-android
      VERSION_MANIFEST: config/version.json
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          # TODO: Fetch only a few commits after using --unreleased in git-cliff
          # Fetch all commits to use as input for the changelog generation
          fetch-depth: 0
          # Fetch all tags to use as input for the changelog generation
          fetch-tags: true

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Read environment variables from the version manifest
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          IMAGE_REPOSITORY_NAME: ${{ env.IMAGE_REPOSITORY_NAME }}
          VERSION_MANIFEST: ${{ env.VERSION_MANIFEST }}
        with:
          script: |
            const script = require('./script/setEnvironmentVariables.js')
            return await script({ core })

      - name: Update changelog
        run: |
          git-cliff -v --tag ${{ env.FLUTTER_VERSION }} --github-repo ${{ github.repository }} --output changelog.md

      - name: Generate authentication token with GitHub App to trigger Actions
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ secrets.VERIFIED_COMMIT_ID }}
          private-key: ${{ secrets.VERIFIED_COMMIT_KEY }}
          repositories: ${{ github.event.repository.name }}
          owner: ${{ github.repository_owner }}

      - name: Open changelog pull request
        id: cpr
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          token: ${{ steps.app-token.outputs.token }}
          sign-commits: true
          branch: release/changelog-${{ env.FLUTTER_VERSION }}
          commit-message: "chore(release): prepare for ${{ env.FLUTTER_VERSION }}"
          title: "chore(release): prepare for ${{ env.FLUTTER_VERSION }}"
          body: |
            Regenerated `changelog.md` for ${{ env.FLUTTER_VERSION }}.

            Merging this PR triggers the tag-creation pass of `prepare-release.yml`,
            which tags the merged commit and starts `release.yml`.

      - name: Enable auto-merge on the changelog pull request
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"

  # Pass 2: the changelog PR has merged (changelog.md changed on main); tag the
  # merged commit. Runs ONLY on the changelog.md push, never on the version.json pass.
  create-tag:
    name: Create tag
    needs: detect
    if: github.event_name == 'push' && needs.detect.outputs.changelog_changed == 'true'
    runs-on: ubuntu-24.04
    env:
      IMAGE_REPOSITORY_NAME: flutter-android
      VERSION_MANIFEST: config/version.json
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Generate authentication token with GitHub App to trigger Actions
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ secrets.VERIFIED_COMMIT_ID }}
          private-key: ${{ secrets.VERIFIED_COMMIT_KEY }}
          repositories: ${{ github.event.repository.name }}
          owner: ${{ github.repository_owner }}

      - name: Read environment variables from the version manifest
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          IMAGE_REPOSITORY_NAME: ${{ env.IMAGE_REPOSITORY_NAME }}
          VERSION_MANIFEST: ${{ env.VERSION_MANIFEST }}
        with:
          script: |
            const script = require('./script/setEnvironmentVariables.js')
            return await script({ core })

      - name: Create Tag for a New Flutter Version
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          NEW_FLUTTER_VERSION: ${{ env.FLUTTER_VERSION }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const script = require('./script/createGitTag.js')
            await script({ core, context, github })
