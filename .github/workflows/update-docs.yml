name: Update docs

on:
  push:
    branches:
      - main
    paths:
      - docs/src/**
  workflow_dispatch:

permissions:
  contents: read

# Opens a PR on main (no direct push); serialize to avoid two runs racing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-docs:
    name: Update docs
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Build documentation
        working-directory: docs/src
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Generate authentication token with GitHub App to trigger Actions
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ secrets.VERIFIED_COMMIT_ID }}
          private-key: ${{ secrets.VERIFIED_COMMIT_KEY }}
          repositories: ${{ github.event.repository.name }}
          owner: ${{ github.repository_owner }}

      - name: Open documentation pull request
        id: cpr
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          token: ${{ steps.app-token.outputs.token }}
          sign-commits: true
          branch: docs/regenerate-${{ github.sha }}
          commit-message: 'docs: regenerate documentation files'
          title: 'docs: regenerate documentation files'
          body: |
            Regenerated documentation from `docs/src/**`.
          # No PR is opened when the build produced no diff (create-pull-request
          # is a no-op on an empty changeset), preserving the prior
          # success-if-no-changes behavior.

      - name: Enable auto-merge on the documentation pull request
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
