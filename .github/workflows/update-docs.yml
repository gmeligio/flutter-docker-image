name: Update docs

# docs/src/*.mdx is the source; compile.js generates committed Markdown outputs
# (readme.md, windows.md, contributing.md, license.md). When a PR edits the source,
# this workflow regenerates those outputs and commits them back ONTO THE PR BRANCH,
# so source and generated output are reviewed and merged together — no separate
# post-merge PR, no direct push to main. PRs touching docs/src/** come only from the
# maintainer and renovate[bot] (same-repo branches, never forks), so pull_request
# (not pull_request_target) gives the App token write access to the PR head.
on:
  pull_request:
    paths:
      - docs/src/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  update-docs:
    name: Update docs
    runs-on: ubuntu-24.04
    # Fork-gate: same-repo PRs only (the maintainer and renovate[bot]). On a fork PR
    # this job is skipped, so the App secret and the write-token PR-head checkout
    # never run against untrusted code (closes the 'pwn request' class). Mirrors the
    # guard on gx.yml's `tidy` job.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    # Needs write to push the regenerated output onto the PR branch.
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Generate authentication token with GitHub App to trigger Actions
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ secrets.VERIFIED_COMMIT_ID }}
          private-key: ${{ secrets.VERIFIED_COMMIT_KEY }}
          repositories: ${{ github.event.repository.name }}
          owner: ${{ github.repository_owner }}

      - name: Checkout PR head
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          # Check out the PR branch so the regenerated output can be committed back.
          # workflow_dispatch falls back to the dispatched ref.
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Build documentation
        working-directory: docs/src
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Commit regenerated documentation to the PR branch
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          # Identify commits as the App, matching the existing verified-commit history.
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"

          git add -A
          # Only commit+push when the build produced a diff. On a no-diff run this is a
          # no-op, so nothing is pushed and the synchronize re-trigger does not loop.
          if git diff --cached --quiet; then
            echo "Documentation already in sync — nothing to commit."
          else
            git commit -m 'docs: regenerate documentation files'
            git push
          fi
