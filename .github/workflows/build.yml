name: Build

on:
  pull_request:
  workflow_dispatch:

# Read-only permissions by default
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # Resolves the bootstrap container tag — the latest published release tag.
  # Reading from the releases API (instead of vars.FLUTTER_VERSION) makes
  # fork PRs work, and reading from releases (instead of main's version.json)
  # avoids the window between merging a version-bump PR and publishing its
  # image during which main's version.json points to a tag that doesn't
  # exist in GHCR yet.
  setup:
    name: Read latest release
    runs-on: ubuntu-24.04
    outputs:
      flutter_version: ${{ steps.read.outputs.version }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Read latest release tag
        id: read
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(gh api "repos/${{ github.repository }}/releases/latest" --jq '.tag_name')
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-image:
    name: Build and push image (${{ matrix.name }})
    permissions:
      packages: write
    runs-on: ubuntu-24.04
    # One leg per published Linux image, both from android.Dockerfile: `target`
    # picks the stage, `name` the published repository.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: flutter-android
            target: android
          - name: flutter-web
            target: web
    # These are image-independent, so the last-leg-wins behaviour of matrix job
    # outputs is harmless: both legs compute the same handoff for test/scan. The
    # per-image digest is not image-independent, so scan-image recomputes it.
    outputs:
      tag: ${{ steps.handoff.outputs.tag }}
      is_fork: ${{ steps.handoff.outputs.is_fork }}
      flutter_version: ${{ env.FLUTTER_VERSION }}
    env:
      IMAGE_REPOSITORY_NAME: ${{ matrix.name }}
      VERSION_MANIFEST: config/version.json
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Read environment variables from the version manifest
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          IMAGE_REPOSITORY_NAME: ${{ env.IMAGE_REPOSITORY_NAME }}
          VERSION_MANIFEST: ${{ env.VERSION_MANIFEST }}
        with:
          script: |
            const script = require('./script/setEnvironmentVariables.js')
            return await script({ core })

      - name: Clean runner disk
        uses: ./.github/actions/clean-runner-disk

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      # Secrets are not available to PRs from forks, so skip the Docker Hub
      # login for those runs. The build still works against public base images.
      - name: Login to Docker Hub
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Login to GHCR
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute handoff tag
        id: handoff
        env:
          IS_PR: ${{ github.event_name == 'pull_request' }}
          IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "is_fork=$IS_FORK" >> "$GITHUB_OUTPUT"
          if [[ "$IS_PR" == "true" ]]; then
            echo "tag=pr-$PR_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "tag=branch-${REF_NAME//\//-}" >> "$GITHUB_OUTPUT"
          fi

      # Emit the GHCR ref under the handoff tag (pr-<N> or branch-<ref>).
      # Buildx Step A pushes this single tag with SBOM + provenance
      # attestations. PR builds live on GHCR only; release publishing to
      # Docker Hub continues from `release.yml`, unchanged.
      - name: Load image metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        id: metadata
        with:
          images: |
            ghcr.io/${{ env.IMAGE_REPOSITORY_PATH }}
          tags: |
            type=raw,value=${{ steps.handoff.outputs.tag }}

      # Non-fork path: push the OCI image index with SBOM + max-mode
      # provenance attestations to GHCR. Scout reads the SBOM attestation
      # via `registry://...@<digest>` in `scan-image`, skipping the
      # layer-walk indexing step. Attestations also benefit downstream
      # consumers (verifiable provenance, queryable SBOM).
      - name: Build image (push to GHCR with attestations)
        if: steps.handoff.outputs.is_fork != 'true'
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          file: android.Dockerfile
          push: true
          sbom: true
          provenance: mode=max
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:buildcache,mode=max
          labels: ${{ steps.metadata.outputs.labels }}
          tags: ${{ steps.metadata.outputs.tags }}
          target: ${{ matrix.target }}
          # The android build-args are inert for the web target (its stage
          # declares none of them), so a single shared block serves both legs.
          build-args: |
            flutter_version=${{ env.FLUTTER_VERSION }}
            fastlane_version=${{ env.FASTLANE_VERSION }}
            android_build_tools_version=${{ env.ANDROID_BUILD_TOOLS_VERSION }}
            android_platform_versions=${{ env.ANDROID_PLATFORM_VERSIONS }}
            android_ndk_version=${{ env.ANDROID_NDK_VERSION }}
            cmake_version=${{ env.CMAKE_VERSION }}

      # Fork path: forks can't push to GHCR or Docker Hub, so build into
      # the local Docker daemon and hand off via artifact (steps below).
      # No attestations — `scan-image` is skipped for forks per
      # `ci-parallel-image-validation`, so no SBOM is needed.
      - name: Build image (local artifact only)
        if: steps.handoff.outputs.is_fork == 'true'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          file: android.Dockerfile
          outputs: type=docker
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:buildcache
          labels: ${{ steps.metadata.outputs.labels }}
          tags: ${{ steps.metadata.outputs.tags }}
          target: ${{ matrix.target }}
          build-args: |
            flutter_version=${{ env.FLUTTER_VERSION }}
            fastlane_version=${{ env.FASTLANE_VERSION }}
            android_build_tools_version=${{ env.ANDROID_BUILD_TOOLS_VERSION }}
            android_platform_versions=${{ env.ANDROID_PLATFORM_VERSIONS }}
            android_ndk_version=${{ env.ANDROID_NDK_VERSION }}
            cmake_version=${{ env.CMAKE_VERSION }}

      # Re-tag to an owner-less `<name>:<version>` so test-image can rebuild the
      # ref from flutter_version; a job output carrying the owner would be masked
      # (owner == DOCKER_HUB_USERNAME on this repo).
      #
      # Forks only: non-fork builds push straight to GHCR (no local daemon copy).
      - name: Re-tag image for local handoff
        if: steps.handoff.outputs.is_fork == 'true'
        id: local_tag
        run: |
          DEST="${{ matrix.name }}:${{ env.FLUTTER_VERSION }}"
          docker tag "${{ fromJSON(steps.metadata.outputs.json).tags[0] }}" "$DEST"
          echo "ref=$DEST" >> "$GITHUB_OUTPUT"

      - name: Save image as artifact
        if: steps.handoff.outputs.is_fork == 'true'
        run: docker save "${{ steps.local_tag.outputs.ref }}" | gzip > image.tar.gz

      # Artifact name is suffixed with the image name so the two matrix legs
      # do not overwrite each other's upload (artifact names are run-global).
      - name: Upload image artifact
        if: steps.handoff.outputs.is_fork == 'true'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: image-${{ github.run_id }}-${{ matrix.name }}
          path: image.tar.gz
          retention-days: 1
          compression-level: 0

  test-image:
    name: Test image (${{ matrix.name }})
    needs: build-image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    # Mirror the build matrix; the structure-test config is the only per-image input.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: flutter-android
            config: test/android.yml
          - name: flutter-web
            config: test/web.yml
    env:
      # build-image's handoff: non-fork legs pull GHCR under TAG; forks load the
      # local artifact built under flutter_version.
      IS_FORK: ${{ needs.build-image.outputs.is_fork }}
      TAG: ${{ needs.build-image.outputs.tag }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Clean runner disk
        if: env.IS_FORK == 'true'
        uses: ./.github/actions/clean-runner-disk

      - name: Download image artifact
        if: env.IS_FORK == 'true'
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: image-${{ github.run_id }}-${{ matrix.name }}

      - name: Load image from artifact
        if: env.IS_FORK == 'true'
        run: gunzip -c image.tar.gz | docker load

      - name: Login to GHCR
        if: env.IS_FORK != 'true'
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from registry
        if: env.IS_FORK != 'true'
        run: docker pull "ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ env.TAG }}"

      - name: Test image
        # Fork legs use the local <name>:<version> tag; non-fork legs the GHCR handoff ref.
        run: |
          if [[ "${IS_FORK}" == "true" ]]; then
            IMAGE="${{ matrix.name }}:${{ needs.build-image.outputs.flutter_version }}"
          else
            IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ env.TAG }}"
          fi
          container-structure-test test --image "$IMAGE" --config ${{ matrix.config }}

  scan-image:
    name: Scan image (${{ matrix.name }})
    needs: [setup, build-image]
    runs-on: ubuntu-24.04
    # Preserve the fork-PR gate: forks have no Docker Hub secret and can't
    # write PR comments, so Scout is skipped entirely for them (job-level if).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      packages: read
      pull-requests: write
      security-events: write
    # Mirror the build matrix: each image is scanned against its own release.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: flutter-android
          - name: flutter-web
    env:
      TAG: ${{ needs.build-image.outputs.tag }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Scout's API enforces the Docker Hub / DSOS entitlement on every
      # call: without an authenticated Docker Hub identity tied to the
      # entitled org, Scout returns "user not entitled to use Docker
      # Scout" regardless of which registry the image lives on. The
      # Docker Hub login here is for that entitlement check, not for
      # image transport — the source and target images are both pulled
      # from GHCR.
      - name: Login to Docker Hub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Resolve the pushed manifest digest by its handoff tag. Scout consumes the
      # image by digest to read the attached SBOM instead of re-indexing layers;
      # the digest can't flow through a matrix job output, hence the lookup.
      - name: Resolve image digest
        id: digest
        run: |
          ref="ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ env.TAG }}"
          digest="$(docker buildx imagetools inspect "$ref" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "value=$digest" >> "$GITHUB_OUTPUT"

      # Skip the compare until this image has a published release to compare
      # against: a brand-new image (e.g. flutter-web's first PR) would otherwise
      # hard-fail with MANIFEST_UNKNOWN.
      - name: Check baseline exists
        id: baseline
        run: |
          ref="ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ needs.setup.outputs.flutter_version }}"
          if docker buildx imagetools inspect "$ref" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No published ${{ matrix.name }}:${{ needs.setup.outputs.flutter_version }} baseline yet — skipping Scout compare (first release of this image)."
          fi

      # Compare the PR's image (read via the SBOM attestation attached at
      # build time) against the latest published release, pinned by tag.
      # `to:` replaces the env-stream lookup (`to-env: prod`) — Scout DSOS
      # does not natively integrate with GHCR, so env-stream tracking would
      # require dual-pushing to Docker Hub. The pinned `to:` comparator
      # gives the same delta-vs-prod semantic with one registry.
      - name: Scan with Docker Scout
        if: steps.baseline.outputs.exists == 'true'
        id: docker-scout
        uses: docker/scout-action@f8c776824083494ab0d56b8105ba2ca85c86e4de # v1.18.2
        with:
          command: compare
          image: registry://ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}@${{ steps.digest.outputs.value }}
          to: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ needs.setup.outputs.flutter_version }}
          github-token: ${{ github.token }}
          only-fixed: true

  validate-version-files:
    name: Validate version files
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      # config/version.json is the single source of truth; #Version embeds
      # #FlutterVersion, so this validates the Flutter block too.
      - name: Validate version.json with CUE
        run: cue vet config/schema.cue -d '#Version' config/version.json

  validate-generated-config:
    name: Validate generated config
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Generate test files with CUE
        run: |
          ./script/update_test.sh

      - name: Check if there are any changes in the git working tree
        run: |
          git add -A
          git diff --exit-code HEAD

  build-docs:
    name: Build docs
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Build documentation
        run: mise run docs

      # Upload generated docs so reviewers can inspect them. Commit-back is
      # handled by update-docs.yml on push to main — pushing to fork PR
      # branches is not possible with base-repo credentials.
      - name: Upload built docs
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: docs-${{ github.event.pull_request.number || github.sha }}
          path: |
            readme.md
            examples/
          retention-days: 14

  test-gradle:
    name: Test Gradle
    needs: setup
    permissions:
      # Allow to read packages to pull the container image from GitHub Container Registry
      packages: read
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/flutter-android:${{ needs.setup.outputs.flutter_version }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Read version.json
        id: version-json
        run: |
          {
            echo "content<<EOF"
            cat ./config/version.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set environment variables from version.json
        run: |
          echo "FLUTTER_VERSION=${{ fromJson( steps.version-json.outputs.content ).flutter.version }}" >> "$GITHUB_ENV"
          echo "FLUTTER_CHANNEL=${{ fromJson( steps.version-json.outputs.content ).flutter.channel }}" >> "$GITHUB_ENV"

      - name: Setup Flutter
        run: |
          cd "$FLUTTER_ROOT"
          git fetch origin ${{ env.FLUTTER_VERSION }}:${{ env.FLUTTER_VERSION }}
          git switch --discard-changes ${{ env.FLUTTER_VERSION }}

      - name: Create test application
        run: |
          flutter create test_app

      - name: Update default Android platform versions in Flutter
        working-directory: test_app/android
        run: |
          cat ../../script/updateAndroidVersions.gradle.kts >> app/build.gradle.kts
          ./gradlew --warning-mode all updateAndroidVersions

      - name: Validate version.json with CUE
        run: cue vet config/schema.cue -d '#Version' config/version.json
