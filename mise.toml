[tools]
cue = "0.17.1"
git-cliff = "2.13.1"
# For update-android-version: the flutter-android container lacks jq.
jq = "1.8.2"
node = "lts"
"github:gmeligio/gx" = "0.8.3"
"github:GoogleContainerTools/container-structure-test[exe=container-structure-test-linux-amd64]" = "1.22.1"

# Code-generate the committed docs output from config/version.json (the single
# source of truth, CUE-validated by config/schema.cue): readme.md via the Node
# generator, and examples/*.yml via `cue export`. windows.md, contributing.md,
# and LICENSE.md are static. Used by update-docs.yml (check + generate),
# build.yml, and update-version.yml, and run locally as `mise run docs`.
[tasks.docs]
description = "Code-generate readme.md and examples/*.yml from config/version.json"
run = [
  "cue export docs/examples.cue config/version.json -e github  --out yaml > examples/github-actions.yml",
  "cue export docs/examples.cue config/version.json -e gitlab  --out yaml > examples/gitlab-ci.yml",
  "cue export docs/examples.cue config/version.json -e gitea   --out yaml > examples/gitea-actions.yml",
  "cue export docs/examples.cue config/version.json -e forgejo --out yaml > examples/forgejo-actions.yml",
  "node docs/build.mjs",
]
