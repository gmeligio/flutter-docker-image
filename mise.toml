[tools]
cue = "0.15.0"
git-cliff = "2.10.1"
# jq is needed by the update-android-version job, whose flutter-android
# container does not ship it; mise provides it independent of the image.
jq = "1.8.1"
pnpm = "11.2.2"
node = "lts"
"github:gmeligio/gx" = "0.8.2"
"github:GoogleContainerTools/container-structure-test[exe=container-structure-test-linux-amd64]" = "1.22.1"

# Regenerate the committed docs output (readme.md, windows.md, contributing.md,
# license.md) from docs/src/**. Single source of truth for the docs build, used
# by update-docs.yml (check + generate) and update-version.yml, and run locally
# as `mise run docs` from anywhere in the repo.
[tasks.docs]
description = "Regenerate committed docs output from docs/src/**"
dir = "docs/src"
run = [
  "pnpm install --frozen-lockfile",
  "pnpm run build",
]
